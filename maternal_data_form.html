<h2>Maternal Data Form</h2>

<form method="POST">
    Patient ID: <input type="number" name="patient_id" required><br><br>

    BMI: <input type="number" step="0.1" name="bmi"><br><br>

    Anemia:
    <select name="anemia">
        <option>Yes</option>
        <option>No</option>
    </select><br><br>

    Diabetes:
    <select name="diabetes">
        <option>Yes</option>
        <option>No</option>
    </select><br><br>

    Hypertension:
    <select name="hypertension">
        <option>Yes</option>
        <option>No</option>
    </select><br><br>

    Pregnancy Complications:
    <input type="text" name="complications"><br><br>

    Income Level:
    <input type="text" name="income"><br><br>

    Sanitation:
    <select name="sanitation">
        <option>Good</option>
        <option>Poor</option>
    </select><br><br>

    <button type="submit">Next</button>
</form>
