<h2>All Notifications</h2>

<table border="1">
<tr>
<th>Type</th>
<th>Risk</th>
<th>Message</th>
<th>Status</th>
<th>Time</th>
</tr>

{% for alert in alerts %}
<tr>
<td>{{ alert['alert_type'] }}</td>
<td>{{ alert['risk_level'] }}</td>
<td>{{ alert['message'] }}</td>
<td>{{ alert['status'] }}</td>
<td>{{ alert['created_at'] }}</td>
</tr>
{% endfor %}
</table>
