<h2>Postpartum Monitoring</h2>

<form method="POST">

Patient ID: <input type="number" name="patient_id" required><br><br>

Bleeding:
<select name="bleeding">
<option>None</option>
<option>Mild</option>
<option>Severe</option>
</select><br><br>

Fever (°C):
<input type="number" step="0.1" name="fever" required><br><br>

Blood Pressure:
<input type="text" name="blood_pressure"><br><br>

Infection Signs:
<select name="infection">
<option>No</option>
<option>Yes</option>
</select><br><br>

Mental Health:
<select name="mental_health">
<option>Stable</option>
<option>Depression</option>
</select><br><br>

<button type="submit">Evaluate</button>
</form>
